# Parallel "test instance" stack — a second full copy of the server + DB that
# runs alongside production so a feature branch can be smoke-tested in isolation.
#
# Driven by `make testinst BRANCH=<branch>` (see the Makefile). That target checks
# the branch out into a git worktree and points TEST_BUILD_CONTEXT at it, so the
# *source* comes from the branch while this orchestration file comes from
# whatever branch you ran make from (usually master). All knobs read from the
# TEST_* keys in the SAME .env file production uses — see .env.example.
#
# The `name:` below sets the Compose project, which namespaces containers,
# networks and volumes (gamchess-test_*), so nothing collides with prod.
name: gamchess-test

services:

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      # Absolute path to the branch worktree, injected by `make testinst`.
      # Falls back to the repo root for a plain `docker compose` invocation.
      context: ${TEST_BUILD_CONTEXT:-..}
      dockerfile: docker/Dockerfile
      args:
        # The worktree's .git is outside the build context, so the in-container
        # git fallback can't see it; `make testinst` passes the hash here.
        GIT_HASH: ${GIT_HASH:-}
    restart: unless-stopped
    ports:
      # Loopback only, same as prod — see the comment in docker-compose.yml.
      # Reach it via an SSH tunnel or local curl.
      - "127.0.0.1:${TEST_PORT:-6465}:6464"
    environment:
      DATABASE_URL: "postgres://gamchess@postgres:5432/gamchess?sslmode=disable"
      PORT: "6464"
      # The test instance's OWN public URL, so the Steam OpenID return comes back
      # here and not to prod. Must be distinct from PUBLIC_BASE_URL. Blank
      # disables web sign-in on test.
      PUBLIC_BASE_URL: "${TEST_PUBLIC_BASE_URL}"
      FRONTEND_DIR: "/frontend"
      SESSION_SECRET: "${SESSION_SECRET}"
      # Lichess (M8). The redirect URI derives from PUBLIC_BASE_URL above, so the
      # test instance sends players back to ITSELF — never to prod.
      #
      # The token key is deliberately the SAME as prod's, because a separate one
      # would buy nothing: both instances run on this host and read this .env, so
      # anything that can read one key can read both. The key only ever decrypts
      # rows in its own database, and those are already separate (distinct Compose
      # projects, distinct volumes) — so a link made on test grants prod nothing,
      # key or no key. Set LICHESS_TOKEN_KEY once, in .env.
      #
      # What DOES differ, and matters, is the redirect origin. lichess records
      # clientOrigin on each token, so testchess.gamah.net and chess.gamah.net are
      # two separate apps as far as lichess is concerned: a player who links on
      # both has TWO grants and two entries on /account/security, and revoking one
      # leaves the other live. Linking on test is a real grant against a real
      # account — it is not a sandbox.
      LICHESS_TOKEN_KEY: "${LICHESS_TOKEN_KEY}"
      LICHESS_AUDIT_KEY: "${LICHESS_AUDIT_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:   gamchess
      POSTGRES_USER: gamchess
      # No password — see docker-compose.yml. Loopback + internal-net only; each
      # testinst run gets a fresh empty volume, so trust always applies cleanly.
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Loopback only — host-side tooling can reach the test DB on its own port.
      - "127.0.0.1:${TEST_PG_PORT:-5436}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamchess"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

networks:
  internal:

volumes:
  postgres_data:
